name: Architecture Guard

# Browser Safety Rule — block client→server layer leakage before merge.
# Runs boundary lint, dependency-cruiser, and (on PR) post-build bundle scan.

on:
  pull_request:
    branches: [develop, main]

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # Avoid poisoned/partial npm cache causing instant npm ci failures.
          # (cache: npm disabled on purpose — see CHANGE_HISTORY #028)

      - name: Install dependencies
        # msnodesqlv8 native ODBC build is not required for lint/boundary checks (mock driver).
        # Use npm install (not ci) so a transient lock sync / optional-native issue cannot
        # hard-fail the guard before ESLint runs. --ignore-scripts skips native compile.
        run: |
          set -eux
          test -f package.json
          test -f package-lock.json
          npm install --ignore-scripts --no-audit --no-fund
          node scripts/patch-next-tsconfig-path.js

      - name: ESLint (lib/client + lib/shared + package.json ban)
        run: npm run lint

      - name: Architecture boundary scan (use client modules)
        run: npm run lint:boundaries

      - name: Dependency graph validation
        run: npm run lint:deps

  browser-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        # Same rationale as boundaries — skip native ODBC; mock driver for build.
        run: |
          set -eux
          test -f package.json
          test -f package-lock.json
          npm install --ignore-scripts --no-audit --no-fund
          node scripts/patch-next-tsconfig-path.js

      - name: Production build
        # Do NOT set REPOSITORY_DRIVER=mock here: NODE_ENV=production + mock
        # throws outside NEXT_PHASE (env.ts). Unset driver lets the build phase
        # default to mock via isBuildPhase. SESSION_SECRET still required.
        run: npm run build
        env:
          SESSION_SECRET: ci-browser-safety-check-secret-min-32-chars
          NEXT_TELEMETRY_DISABLED: 1
          # Ensure Linux CI never loads the native ODBC binding during compile.
          CI: "true"

      - name: Scan client bundles for Node/SQL native modules
        run: npm run lint:browser
